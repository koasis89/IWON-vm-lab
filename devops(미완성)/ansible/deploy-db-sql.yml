---
- name: Apply DB SQL migration file
  hosts: db
  become: true
  gather_facts: false
  vars:
    db_sql_migration_file: ""

  tasks:
    - name: Assert migration SQL file is provided
      ansible.builtin.assert:
        that:
          - db_sql_migration_file | length > 0
        fail_msg: "db_sql_migration_file is required."

    - name: Copy migration SQL to db host
      ansible.builtin.copy:
        src: "{{ db_sql_migration_file }}"
        dest: "{{ vm_lab_root }}/migration.sql"
        owner: "{{ service_user }}"
        group: "{{ service_user }}"
        mode: "0644"

    - name: Apply migration SQL to target database
      ansible.builtin.shell: |
        mariadb -h 127.0.0.1 -u root -p'{{ db_root_password }}' {{ db_name }} < {{ vm_lab_root }}/migration.sql
      register: db_migration_result
      changed_when: db_migration_result.rc == 0
