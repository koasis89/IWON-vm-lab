---
- name: Set migration variables
  ansible.builtin.set_fact:
    migration_src: "{{ current_migration_src }}"
    migration_key: "{{ current_migration_src | replace(db_migrations_abs_root ~ '/', '') }}"
    migration_tmp_path: "{{ db_migrations_tmp_dir }}/{{ (current_migration_src | replace(db_migrations_abs_root ~ '/', '')) | replace('/', '__') }}"
    rollback_src: "{{ current_migration_src | regex_replace('\\.sql$', '.rollback.sql') }}"
    rollback_tmp_path: "{{ db_migrations_tmp_dir }}/{{ ((current_migration_src | replace(db_migrations_abs_root ~ '/', '')) | regex_replace('\\.sql$', '.rollback.sql')) | replace('/', '__') }}"

- name: Check migration already applied
  ansible.builtin.shell: |
    mariadb -h 127.0.0.1 -u root -p'{{ db_root_password }}' -Nse "SELECT COUNT(*) FROM {{ db_name }}.schema_migrations WHERE migration_key='{{ migration_key | replace("'", "''") }}';"
  register: migration_exists
  changed_when: false

- name: Copy migration SQL to db host
  ansible.builtin.copy:
    src: "{{ migration_src }}"
    dest: "{{ migration_tmp_path }}"
    owner: "{{ service_user }}"
    group: "{{ service_user }}"
    mode: "0644"
  when: migration_exists.stdout != '1'

- name: Check rollback SQL exists on controller
  ansible.builtin.stat:
    path: "{{ rollback_src }}"
  register: rollback_src_stat
  delegate_to: localhost
  become: false
  when: migration_exists.stdout != '1'

- name: Execute migration SQL
  ansible.builtin.shell: |
    mariadb -h 127.0.0.1 -u root -p'{{ db_root_password }}' {{ db_name }} < {{ migration_tmp_path }}
  register: migration_exec
  changed_when: migration_exec.rc == 0
  failed_when: false
  when: migration_exists.stdout != '1'

- name: Copy rollback SQL to db host
  ansible.builtin.copy:
    src: "{{ rollback_src }}"
    dest: "{{ rollback_tmp_path }}"
    owner: "{{ service_user }}"
    group: "{{ service_user }}"
    mode: "0644"
  when:
    - migration_exists.stdout != '1'
    - migration_exec.rc != 0
    - db_enable_rollback_hook | bool
    - rollback_src_stat.stat.exists

- name: Execute rollback hook SQL
  ansible.builtin.shell: |
    mariadb -h 127.0.0.1 -u root -p'{{ db_root_password }}' {{ db_name }} < {{ rollback_tmp_path }}
  register: rollback_exec
  changed_when: rollback_exec.rc == 0
  failed_when: false
  when:
    - migration_exists.stdout != '1'
    - migration_exec.rc != 0
    - db_enable_rollback_hook | bool
    - rollback_src_stat.stat.exists

- name: Notify migration failure webhook
  ansible.builtin.uri:
    url: "{{ db_rollback_notify_webhook_url }}"
    method: POST
    body_format: json
    headers:
      Content-Type: application/json
    body:
      text: >-
        [{{ db_rollback_notify_context }}][db-migration-failed]
        migration={{ migration_key }}
        rollback_enabled={{ db_enable_rollback_hook | bool }}
        rollback_exists={{ rollback_src_stat.stat.exists | default(false) }}
        rollback_rc={{ rollback_exec.rc | default('n/a') }}
  delegate_to: localhost
  become: false
  no_log: true
  failed_when: false
  when:
    - migration_exists.stdout != '1'
    - migration_exec.rc != 0
    - db_rollback_notify_enabled | bool
    - db_rollback_notify_webhook_url | length > 0
    - db_rollback_notify_channel not in ['teams', 'slack']

- name: Notify Teams card for migration failure
  ansible.builtin.uri:
    url: "{{ db_rollback_notify_webhook_url }}"
    method: POST
    body_format: json
    headers:
      Content-Type: application/json
    body:
      "@type": "MessageCard"
      "@context": "https://schema.org/extensions"
      summary: "DB migration failed"
      themeColor: "D93F0B"
      title: "DB Migration Failed ({{ db_rollback_notify_context }})"
      sections:
        - facts:
            - name: migration
              value: "{{ migration_key }}"
            - name: rollback_enabled
              value: "{{ db_enable_rollback_hook | bool }}"
            - name: rollback_exists
              value: "{{ rollback_src_stat.stat.exists | default(false) }}"
            - name: rollback_rc
              value: "{{ rollback_exec.rc | default('n/a') }}"
            - name: host
              value: "{{ inventory_hostname }}"
          markdown: true
  delegate_to: localhost
  become: false
  no_log: true
  failed_when: false
  when:
    - migration_exists.stdout != '1'
    - migration_exec.rc != 0
    - db_rollback_notify_enabled | bool
    - db_rollback_notify_webhook_url | length > 0
    - db_rollback_notify_channel == 'teams'

- name: Notify Slack Block Kit for migration failure
  ansible.builtin.uri:
    url: "{{ db_rollback_notify_webhook_url }}"
    method: POST
    body_format: json
    headers:
      Content-Type: application/json
    body:
      text: "DB migration failed ({{ db_rollback_notify_context }})"
      blocks:
        - type: header
          text:
            type: plain_text
            text: "DB Migration Failed"
        - type: section
          fields:
            - type: mrkdwn
              text: "*Context*\n{{ db_rollback_notify_context }}"
            - type: mrkdwn
              text: "*Host*\n{{ inventory_hostname }}"
            - type: mrkdwn
              text: "*Migration*\n{{ migration_key }}"
            - type: mrkdwn
              text: "*Rollback Enabled*\n{{ db_enable_rollback_hook | bool }}"
            - type: mrkdwn
              text: "*Rollback Exists*\n{{ rollback_src_stat.stat.exists | default(false) }}"
            - type: mrkdwn
              text: "*Rollback RC*\n{{ rollback_exec.rc | default('n/a') }}"
  delegate_to: localhost
  become: false
  no_log: true
  failed_when: false
  when:
    - migration_exists.stdout != '1'
    - migration_exec.rc != 0
    - db_rollback_notify_enabled | bool
    - db_rollback_notify_webhook_url | length > 0
    - db_rollback_notify_channel == 'slack'

- name: Fail when migration execution fails
  ansible.builtin.fail:
    msg: >-
      Migration failed: {{ migration_key }}.
      Rollback hook enabled={{ db_enable_rollback_hook | bool }},
      rollback_exists={{ rollback_src_stat.stat.exists | default(false) }},
      rollback_rc={{ rollback_exec.rc | default('n/a') }}.
  when:
    - migration_exists.stdout != '1'
    - migration_exec.rc != 0

- name: Record applied migration
  ansible.builtin.shell: |
    mariadb -h 127.0.0.1 -u root -p'{{ db_root_password }}' -e "INSERT INTO {{ db_name }}.schema_migrations (migration_key) VALUES ('{{ migration_key | replace("'", "''") }}');"
  changed_when: true
  when:
    - migration_exists.stdout != '1'
    - migration_exec.rc == 0
