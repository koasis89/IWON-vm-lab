trigger: none

pr: none

parameters:
  - name: runTerraform
    displayName: Run Terraform Apply
    type: boolean
    default: false

  - name: deployTarget
    displayName: Ansible deploy target
    type: string
    default: was
    values:
      - web
      - was
      - app
      - integration

  - name: artifactFeedName
    displayName: Artifacts feed name
    type: string
    default: iwon-smart-feed

  - name: artifactFeedView
    displayName: Artifacts feed view (maven)
    type: string
    default: ""

  - name: mavenPackageDefinition
    displayName: Maven package definition (group:artifact)
    type: string
    default: ""

  - name: mavenPackageVersion
    displayName: Maven package version
    type: string
    default: latest

  - name: artifactPattern
    displayName: Downloaded artifact filename pattern
    type: string
    default: ""

  - name: bootstrapAdoAgent
    displayName: Bootstrap Azure DevOps self-hosted agent
    type: boolean
    default: false

  - name: bootstrapAgentTarget
    displayName: Inventory group/host to register as ADO agent
    type: string
    default: bastion

variables:
  - name: ENVIRONMENT_NAME_INFRA
    value: iwon-gitops-infra
  - name: ENVIRONMENT_NAME_APP
    value: iwon-gitops-app

  - name: TF_WORKING_DIR
    value: vm-azure
  - name: TFVARS_FILE
    value: vm-azure/environments/prod.tfvars
  - name: TF_OUTPUT_JSON
    value: $(Pipeline.Workspace)/generated/tf-output.json
  - name: ANSIBLE_INVENTORY_OUT
    value: $(Pipeline.Workspace)/generated/inventory.generated.ini
  - name: STATIC_ANSIBLE_INVENTORY_PATH
    value: vm-ansible/inventory.ini

  - name: ANSIBLE_PLAYBOOK_PATH
    value: gitops/ansible/deploy-playbook.yml
  - name: ANSIBLE_CONFIG_PATH
    value: gitops/ansible/ansible.cfg
  - name: ANSIBLE_SSH_USER
    value: iwon
  - name: ANSIBLE_SSH_KEY_PATH
    value: ~/.ssh/id_rsa
  - name: GIT_BASH_DIR
    value: C:\Program Files\Git\bin

  - name: AZURE_SERVICE_CONNECTION
    value: ""
  - name: ANSIBLE_SSH_PRIVATE_KEY_SECURE_FILE
    value: "id_rsa"
  - name: ADO_AGENT_BOOTSTRAP_PLAYBOOK_PATH
    value: gitops/ansible/install-ado-agent.yml
  - name: ADO_AGENT_URL
    value: ""
  - name: ADO_AGENT_POOL
    value: Default
  - name: ADO_AGENT_PAT
    value: ""

  - name: TFSTATE_RG
    value: ""
  - name: TFSTATE_STORAGE
    value: ""
  - name: TFSTATE_CONTAINER
    value: tfstate
  - name: TFSTATE_KEY
    value: vm-azure/prod.tfstate

  # Variable Group values override defaults above when same variable names exist.
  - group: iwon-smart-ops-vg

stages:
  - stage: BootstrapAgent
    displayName: Bootstrap self-hosted Azure DevOps agent
    condition: and(succeeded(), eq('${{ parameters.bootstrapAdoAgent }}', true))
    jobs:
      - job: InstallAdoAgent
        displayName: Install/register ADO agent on bootstrap host
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: InstallSSHKey@0
            displayName: Install SSH private key for bootstrap host
            inputs:
              addEntryToConfig: false
              hostName: bastion01
              userName: $(ANSIBLE_SSH_USER)
              knownHostsEntry: ""
              sshPublicKey: ""
              sshKeySecureFile: $(ANSIBLE_SSH_PRIVATE_KEY_SECURE_FILE)

          - bash: |
              set -euo pipefail
              sudo apt-get update
              sudo apt-get install -y ansible python3-pip
            displayName: Install Ansible for agent bootstrap

          - bash: |
              set -euo pipefail

              if [ -z "$(ADO_AGENT_URL)" ] || [ -z "$(ADO_AGENT_POOL)" ] || [ -z "$(ADO_AGENT_PAT)" ]; then
                echo "##vso[task.logissue type=error]ADO_AGENT_URL, ADO_AGENT_POOL and ADO_AGENT_PAT must be set to bootstrap the self-hosted agent."
                exit 1
              fi

              export ANSIBLE_HOST_KEY_CHECKING=False
              export ANSIBLE_CONFIG="$(Build.SourcesDirectory)/$(ANSIBLE_CONFIG_PATH)"

              ansible-playbook \
                -i "$(Build.SourcesDirectory)/$(STATIC_ANSIBLE_INVENTORY_PATH)" \
                "$(Build.SourcesDirectory)/$(ADO_AGENT_BOOTSTRAP_PLAYBOOK_PATH)" \
                --limit "${{ parameters.bootstrapAgentTarget }}" \
                --extra-vars "ado_url=$(ADO_AGENT_URL) ado_pool=$(ADO_AGENT_POOL) ado_pat=$(ADO_AGENT_PAT) ado_agent_user=$(ANSIBLE_SSH_USER)"
            displayName: Bootstrap Azure DevOps self-hosted agent

  - stage: Terraform
    displayName: Terraform Apply
    condition: and(succeeded(), eq('${{ parameters.runTerraform }}', true))
    jobs:
      - deployment: TerraformApply
        displayName: Apply Terraform
        environment: $(ENVIRONMENT_NAME_INFRA)
        pool:
          name: $(ADO_AGENT_POOL)
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: Install Terraform
                  inputs:
                    terraformVersion: latest

                - task: AzureCLI@2
                  displayName: Terraform init/validate/plan/apply
                  inputs:
                    azureSubscription: iwon-smart-ops-sc
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      if [ -z "$(TFSTATE_RG)" ] || [ -z "$(TFSTATE_STORAGE)" ]; then
                        echo "TFSTATE_RG/TFSTATE_STORAGE must be configured for managed agent runs."
                        exit 1
                      fi

                      terraform -chdir="$(TF_WORKING_DIR)" init \
                        -backend-config="resource_group_name=$(TFSTATE_RG)" \
                        -backend-config="storage_account_name=$(TFSTATE_STORAGE)" \
                        -backend-config="container_name=$(TFSTATE_CONTAINER)" \
                        -backend-config="key=$(TFSTATE_KEY)"

                      terraform -chdir="$(TF_WORKING_DIR)" validate
                      terraform -chdir="$(TF_WORKING_DIR)" plan -var-file="$(TFVARS_FILE)" -out=tfplan
                      terraform -chdir="$(TF_WORKING_DIR)" apply -auto-approve tfplan

                      mkdir -p "$(Pipeline.Workspace)/generated"
                      terraform -chdir="$(TF_WORKING_DIR)" output -json > "$(TF_OUTPUT_JSON)"
                  env:
                    PATH: $(GIT_BASH_DIR);$(PATH)

                - publish: $(TF_OUTPUT_JSON)
                  artifact: terraform-output
                  displayName: Publish Terraform outputs

  - stage: Deploy
    displayName: Artifact Download and VM Deploy
    dependsOn: Terraform
    condition: or(and(eq('${{ parameters.runTerraform }}', true), succeeded('Terraform')), eq('${{ parameters.runTerraform }}', false))
    jobs:
      - deployment: DeployByAnsible
        displayName: Deploy target service
        environment: $(ENVIRONMENT_NAME_APP)
        pool:
          name: $(ADO_AGENT_POOL)
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: Install Terraform
                  inputs:
                    terraformVersion: latest

                - task: DownloadPipelineArtifact@2
                  displayName: Download Terraform outputs artifact
                  condition: eq('${{ parameters.runTerraform }}', true)
                  inputs:
                    artifact: terraform-output
                    path: $(Pipeline.Workspace)/downloaded-terraform

                - bash: |
                    set -euo pipefail

                    if [ -z "$(TFSTATE_RG)" ] || [ -z "$(TFSTATE_STORAGE)" ]; then
                      echo "##vso[task.logissue type=warning]TFSTATE_RG/TFSTATE_STORAGE is not configured. Falling back to static inventory for PoC run."
                      exit 0
                    fi

                    terraform -chdir="$(TF_WORKING_DIR)" init \
                      -backend-config="resource_group_name=$(TFSTATE_RG)" \
                      -backend-config="storage_account_name=$(TFSTATE_STORAGE)" \
                      -backend-config="container_name=$(TFSTATE_CONTAINER)" \
                      -backend-config="key=$(TFSTATE_KEY)"

                    mkdir -p "$(Pipeline.Workspace)/generated"
                    terraform -chdir="$(TF_WORKING_DIR)" output -json > "$(TF_OUTPUT_JSON)"
                  displayName: Export Terraform outputs when Terraform stage is skipped
                  condition: eq('${{ parameters.runTerraform }}', false)
                  env:
                    PATH: $(GIT_BASH_DIR);$(PATH)

                - bash: |
                    set -euo pipefail
                    mkdir -p "$(Pipeline.Workspace)/generated"
                    if [ -f "$(Pipeline.Workspace)/downloaded-terraform/tf-output.json" ]; then
                      cp "$(Pipeline.Workspace)/downloaded-terraform/tf-output.json" "$(TF_OUTPUT_JSON)"
                    fi

                    if [ -f "$(TF_OUTPUT_JSON)" ]; then
                      python3 "$(Build.SourcesDirectory)/gitops/scripts/generate_inventory_from_tf.py" \
                        --tf-output "$(TF_OUTPUT_JSON)" \
                        --output "$(ANSIBLE_INVENTORY_OUT)" \
                        --ssh-user "$(ANSIBLE_SSH_USER)" \
                        --ssh-key-path "$(ANSIBLE_SSH_KEY_PATH)"
                    elif [ -z "$(TFSTATE_RG)" ] || [ -z "$(TFSTATE_STORAGE)" ]; then
                      STATIC_INVENTORY_SOURCE="$(Build.SourcesDirectory)/$(STATIC_ANSIBLE_INVENTORY_PATH)"
                      if [ ! -f "${STATIC_INVENTORY_SOURCE}" ]; then
                        echo "static inventory not found: ${STATIC_INVENTORY_SOURCE}"
                        exit 1
                      fi

                      cp "${STATIC_INVENTORY_SOURCE}" "$(ANSIBLE_INVENTORY_OUT)"

                      sed -i "s|^ansible_user=.*|ansible_user=$(ANSIBLE_SSH_USER)|" "$(ANSIBLE_INVENTORY_OUT)"
                      sed -i "s|^ansible_ssh_private_key_file=.*|ansible_ssh_private_key_file=$(ANSIBLE_SSH_KEY_PATH)|" "$(ANSIBLE_INVENTORY_OUT)"

                      echo "##vso[task.logissue type=warning]Using static inventory fallback: $(STATIC_ANSIBLE_INVENTORY_PATH)"
                    else
                      echo "Terraform outputs were not generated even though TFSTATE variables are configured."
                      exit 1
                    fi
                  displayName: Generate inventory from Terraform outputs
                  env:
                    PATH: $(GIT_BASH_DIR);$(PATH)

                - task: InstallSSHKey@0
                  displayName: Install SSH private key
                  inputs:
                    addEntryToConfig: false
                    hostName: bastion01
                    userName: $(ANSIBLE_SSH_USER)
                    knownHostsEntry: ""
                    sshPublicKey: ""
                    sshKeySecureFile: $(ANSIBLE_SSH_PRIVATE_KEY_SECURE_FILE)

                - bash: |
                    set -euo pipefail
                    if command -v apt-get >/dev/null 2>&1; then
                      sudo apt-get update
                      sudo apt-get install -y ansible python3-pip
                    else
                      python3 -m pip install --upgrade pip
                      python3 -m pip install ansible
                    fi
                  displayName: Install Ansible
                  env:
                    PATH: $(GIT_BASH_DIR);$(PATH)

                - bash: |
                    set -euo pipefail

                    if [ -n "${PARAM_MAVEN_DEF}" ]; then
                      EFFECTIVE_MAVEN_DEF="${PARAM_MAVEN_DEF}"
                    else
                      EFFECTIVE_MAVEN_DEF="com.iteyes.smart:smart-${PARAM_DEPLOY_TARGET}"
                    fi

                    if [ -n "${PARAM_ARTIFACT_PATTERN}" ]; then
                      EFFECTIVE_ARTIFACT_PATTERN="${PARAM_ARTIFACT_PATTERN}"
                    elif [ "${PARAM_DEPLOY_TARGET}" = "web" ]; then
                      EFFECTIVE_ARTIFACT_PATTERN="*.zip"
                    else
                      EFFECTIVE_ARTIFACT_PATTERN="*.jar"
                    fi

                    echo "##vso[task.setvariable variable=EFFECTIVE_MAVEN_DEF]$EFFECTIVE_MAVEN_DEF"
                    echo "##vso[task.setvariable variable=EFFECTIVE_ARTIFACT_PATTERN]$EFFECTIVE_ARTIFACT_PATTERN"
                  displayName: Resolve package definition and artifact pattern
                  env:
                    PATH: $(GIT_BASH_DIR);$(PATH)
                    PARAM_MAVEN_DEF: ${{ parameters.mavenPackageDefinition }}
                    PARAM_DEPLOY_TARGET: ${{ parameters.deployTarget }}
                    PARAM_ARTIFACT_PATTERN: ${{ parameters.artifactPattern }}

                - bash: |
                    set -euo pipefail

                    if [ -z "${SYSTEM_ACCESSTOKEN:-}" ]; then
                      echo "##vso[task.logissue type=error]SYSTEM_ACCESSTOKEN is empty. Enable OAuth token access for scripts in this pipeline/job."
                      exit 1
                    fi

                    ORG_URL="${SYSTEM_COLLECTIONURI%/}"
                    ORG_NAME="${ORG_URL##*/}"
                    PROJECT_SEGMENT="${SYSTEM_TEAMPROJECTID:-${SYSTEM_TEAMPROJECT:-}}"

                    if [ -z "${PROJECT_SEGMENT}" ]; then
                      echo "##vso[task.logissue type=error]SYSTEM_TEAMPROJECT/SYSTEM_TEAMPROJECTID is empty, so the Azure Artifacts project-scoped feed URL cannot be resolved."
                      exit 1
                    fi

                    ENCODED_DEF="$(python3 -c "import os,urllib.parse; print(urllib.parse.quote(os.environ['PKG_DEF'], safe=''))")"

                    API_URL="https://feeds.dev.azure.com/${ORG_NAME}/${PROJECT_SEGMENT}/_apis/Packaging/Feeds/${FEED_NAME}/Packages?packageNameQuery=${ENCODED_DEF}&protocolType=maven&includeAllVersions=true&api-version=7.1-preview.1"
                    TMP_JSON="$(mktemp)"

                    HTTP_CODE="$(curl -sS -o "${TMP_JSON}" -w "%{http_code}" -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" "${API_URL}")"

                    if [ "${HTTP_CODE}" = "401" ] || [ "${HTTP_CODE}" = "403" ]; then
                      echo "##vso[task.logissue type=error]Cannot read Azure Artifacts feed '${FEED_NAME}' (HTTP ${HTTP_CODE}). Verify Build Service read permission for the feed."
                      exit 1
                    fi

                    if [ "${HTTP_CODE}" != "200" ]; then
                      echo "##vso[task.logissue type=error]Package precheck failed with HTTP ${HTTP_CODE}. feed=${FEED_NAME} definition=${PKG_DEF} version=${PKG_VERSION} view=${FEED_VIEW}"
                      echo "API response:"; head -c 500 "${TMP_JSON}"
                      exit 1
                    fi

                    PYCHECK="$(mktemp --suffix=.py)"
                    printf 'import json,sys\n' > "${PYCHECK}"
                    printf 'jp,pd,pv,fn,fv=sys.argv[1:]\n' >> "${PYCHECK}"
                    printf 'data=json.load(open(jp))\n' >> "${PYCHECK}"
                    printf 'pkgs=data.get("value",[])\n' >> "${PYCHECK}"
                    printf 'if not pkgs: print(f"##vso[task.logissue type=error]Package not found in feed. feed={fn} def={pd} ver={pv}. Publish the Maven artifact first, then re-run the deploy pipeline."); sys.exit(1)\n' >> "${PYCHECK}"
                    printf 'avail=[v.get("version") for p in pkgs for v in p.get("versions",[]) if v.get("version")]\n' >> "${PYCHECK}"
                    printf 'latest=next((v.get("version") for p in pkgs for v in p.get("versions",[]) if v.get("isLatest")), None)\n' >> "${PYCHECK}"
                    printf 'if pv.lower()=="latest":\n' >> "${PYCHECK}"
                    printf '    resolved=latest or (sorted(set(avail), reverse=True)[0] if avail else "")\n' >> "${PYCHECK}"
                    printf '    if not resolved: print(f"##vso[task.logissue type=error]Latest version could not be resolved. def={pd}"); sys.exit(1)\n' >> "${PYCHECK}"
                    printf '    print(f"##vso[task.setvariable variable=RESOLVED_MAVEN_VERSION]{resolved}")\n' >> "${PYCHECK}"
                    printf '    print(f"Precheck passed: {pd} latest -> {resolved}"); sys.exit(0)\n' >> "${PYCHECK}"
                    printf 'if pv in avail:\n' >> "${PYCHECK}"
                    printf '    print(f"##vso[task.setvariable variable=RESOLVED_MAVEN_VERSION]{pv}")\n' >> "${PYCHECK}"
                    printf '    print(f"Precheck passed: {pd}=={pv}"); sys.exit(0)\n' >> "${PYCHECK}"
                    printf 'samp=", ".join(sorted(set(avail),reverse=True)[:10])\n' >> "${PYCHECK}"
                    printf 'print(f"##vso[task.logissue type=error]Version not found. def={pd} req={pv} avail={samp}"); sys.exit(1)\n' >> "${PYCHECK}"
                    python3 "${PYCHECK}" "${TMP_JSON}" "${PKG_DEF}" "${PKG_VERSION}" "${FEED_NAME}" "${FEED_VIEW}"
                  displayName: Precheck Maven package availability
                  env:
                    PATH: $(GIT_BASH_DIR);$(PATH)
                    PKG_DEF: $(EFFECTIVE_MAVEN_DEF)
                    PKG_VERSION: ${{ parameters.mavenPackageVersion }}
                    FEED_NAME: ${{ parameters.artifactFeedName }}
                    FEED_VIEW: ${{ parameters.artifactFeedView }}
                    SYSTEM_ACCESSTOKEN: $(System.AccessToken)

                - bash: |
                    set -euo pipefail

                    if [ -z "${SYSTEM_ACCESSTOKEN:-}" ]; then
                      echo "##vso[task.logissue type=error]SYSTEM_ACCESSTOKEN is empty. Enable OAuth token access for scripts in this pipeline/job."
                      exit 1
                    fi

                    ORG_URL="${SYSTEM_COLLECTIONURI%/}"
                    ORG_NAME="${ORG_URL##*/}"
                    PROJECT_SEGMENT="${SYSTEM_TEAMPROJECTID:-${SYSTEM_TEAMPROJECT:-}}"
                    PKG_VERSION="${RESOLVED_MAVEN_VERSION:-${REQUESTED_VERSION}}"

                    GROUP_ID="${PKG_DEF%%:*}"
                    ARTIFACT_ID="${PKG_DEF##*:}"
                    GROUP_PATH="${GROUP_ID//./\/}"

                    FILE_EXT="jar"
                    case "${PATTERN}" in
                      *.zip|*zip) FILE_EXT="zip" ;;
                      *.war|*war) FILE_EXT="war" ;;
                    esac

                    ARTIFACT_URL="https://pkgs.dev.azure.com/${ORG_NAME}/${PROJECT_SEGMENT}/_packaging/${FEED_NAME}/maven/v1/${GROUP_PATH}/${ARTIFACT_ID}/${PKG_VERSION}/${ARTIFACT_ID}-${PKG_VERSION}.${FILE_EXT}"
                    TARGET_PATH="$(System.ArtifactsDirectory)/${ARTIFACT_ID}-${PKG_VERSION}.${FILE_EXT}"
                    mkdir -p "$(System.ArtifactsDirectory)"

                    HTTP_CODE="$(curl -sS -L -o "${TARGET_PATH}" -w "%{http_code}" -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" "${ARTIFACT_URL}")"
                    if [ "${HTTP_CODE}" = "401" ] || [ "${HTTP_CODE}" = "403" ]; then
                      HTTP_CODE="$(curl -sS -L -u ":${SYSTEM_ACCESSTOKEN}" -o "${TARGET_PATH}" -w "%{http_code}" "${ARTIFACT_URL}")"
                    fi

                    if [ "${HTTP_CODE}" != "200" ]; then
                      echo "##vso[task.logissue type=error]Artifact download failed with HTTP ${HTTP_CODE}. url=${ARTIFACT_URL}"
                      exit 1
                    fi

                    echo "Downloaded artifact: ${TARGET_PATH}"
                  displayName: Download artifact from Maven feed
                  env:
                    PATH: $(GIT_BASH_DIR);$(PATH)
                    PKG_DEF: $(EFFECTIVE_MAVEN_DEF)
                    FEED_NAME: ${{ parameters.artifactFeedName }}
                    REQUESTED_VERSION: ${{ parameters.mavenPackageVersion }}
                    PATTERN: $(EFFECTIVE_ARTIFACT_PATTERN)
                    RESOLVED_MAVEN_VERSION: $(RESOLVED_MAVEN_VERSION)
                    SYSTEM_ACCESSTOKEN: $(System.AccessToken)

                - bash: |
                    set -euo pipefail

                    TARGET_ARTIFACT="$(find "$(System.ArtifactsDirectory)" -type f -name "${PATTERN}" | sort | head -n 1)"
                    if [ -z "${TARGET_ARTIFACT}" ]; then
                      echo "artifact not found. pattern=${PATTERN}"
                      echo "download root=$(System.ArtifactsDirectory)"
                      exit 1
                    fi

                    echo "Target artifact: ${TARGET_ARTIFACT}"
                    echo "##vso[task.setvariable variable=TARGET_ARTIFACT]${TARGET_ARTIFACT}"
                  displayName: Validate downloaded artifact
                  env:
                    PATH: $(GIT_BASH_DIR);$(PATH)
                    PATTERN: $(EFFECTIVE_ARTIFACT_PATTERN)

                - bash: |
                    set -euo pipefail
                    export ANSIBLE_HOST_KEY_CHECKING=False

                    if command -v wsl.exe >/dev/null 2>&1; then
                      to_wsl_path() {
                        local input="$1"
                        if [[ "$input" =~ ^/([a-zA-Z])/(.*)$ ]]; then
                          printf '/mnt/%s/%s' "$(printf '%s' "${BASH_REMATCH[1]}" | tr '[:upper:]' '[:lower:]')" "${BASH_REMATCH[2]}"
                        elif [[ "$input" =~ ^([a-zA-Z]):[\\/](.*)$ ]]; then
                          local drive
                          local rest
                          drive="$(printf '%s' "${BASH_REMATCH[1]}" | tr '[:upper:]' '[:lower:]')"
                          rest="${BASH_REMATCH[2]//\\//}"
                          printf '/mnt/%s/%s' "$drive" "$rest"
                        else
                          printf '%s' "$input"
                        fi
                      }

                      SRC_WSL="$(to_wsl_path "$(Build.SourcesDirectory)")"
                      INV_WSL="$(to_wsl_path "$(ANSIBLE_INVENTORY_OUT)")"
                      ART_WSL="$(to_wsl_path "$(TARGET_ARTIFACT)")"
                      KEY_SRC_WSL="$(to_wsl_path "$HOME/.ssh/id_rsa")"
                      KEY_RUNTIME_WSL="~/.ssh/ado_id_rsa"

                      sed -i "s|^ansible_ssh_private_key_file=.*|ansible_ssh_private_key_file=${KEY_RUNTIME_WSL}|" "$(ANSIBLE_INVENTORY_OUT)" || true

                      wsl.exe bash -lc "
                        set -euo pipefail
                        export ANSIBLE_HOST_KEY_CHECKING=False
                        export ANSIBLE_CONFIG='${SRC_WSL}/$(ANSIBLE_CONFIG_PATH)'
                        mkdir -p ~/.ssh
                        cp '${KEY_SRC_WSL}' ~/.ssh/ado_id_rsa
                        chmod 600 ~/.ssh/ado_id_rsa
                        ansible-playbook \
                          -i '${INV_WSL}' \
                          '${SRC_WSL}/$(ANSIBLE_PLAYBOOK_PATH)' \
                          --limit '${{ parameters.deployTarget }}' \
                          --extra-vars 'deployTarget=${{ parameters.deployTarget }} target_artifact=${ART_WSL} ansible_ssh_private_key_file=~/.ssh/ado_id_rsa'
                      "
                    else
                      export PATH="$PATH:/c/Users/koasi/AppData/Roaming/Python/Python311/Scripts:$HOME/.local/bin"
                      export ANSIBLE_CONFIG="$(Build.SourcesDirectory)/$(ANSIBLE_CONFIG_PATH)"

                      ansible-playbook \
                        -i "$(ANSIBLE_INVENTORY_OUT)" \
                        "$(Build.SourcesDirectory)/$(ANSIBLE_PLAYBOOK_PATH)" \
                        --limit "${{ parameters.deployTarget }}" \
                        --extra-vars "deployTarget=${{ parameters.deployTarget }} target_artifact=$(TARGET_ARTIFACT)"
                    fi
                  displayName: Run Ansible deploy playbook
                  env:
                    PATH: $(GIT_BASH_DIR);$(PATH)
