- name: Deploy WAS artifact with java_service role
  ansible.builtin.include_role:
    name: java_service
  vars:
    java_service_name: was
    java_service_description: IWON WAS Service
    java_app_dir: /opt/apps/was
    java_jar_local_src: "{{ target_artifact }}"
    java_jar_remote_name: app.jar
    java_log_file: "{{ log_dir }}/was.log"
    java_xml_gpcl_patch: true
    java_env_vars:
      SPRING_DATASOURCE_URL: "jdbc:mariadb://10.0.2.50:3306/appdb?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul"
      SPRING_DATASOURCE_USERNAME: "appuser"
      SPRING_DATASOURCE_PASSWORD: "appuserpassword123!"
      APP_DATASOURCE_MARIA120_JDBC_URL: "jdbc:mariadb://10.0.2.50:3306/appdb?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul"
      APP_DATASOURCE_MARIA120_USERNAME: "appuser"
      APP_DATASOURCE_MARIA120_PASSWORD: "appuserpassword123!"
      IWON_WALLET_API_BASE_URL: "http://10.0.2.40:8080"
      IWON_TOKEN_API_BASE_URL: "http://10.0.2.40:8080"
      KAFKA_BOOTSTRAP_SERVERS: "{{ kafka_client_bootstrap_servers }}"
      KAFKA_SECURITY_PROTOCOL: "{{ kafka_client_security_protocol }}"
      KAFKA_TLS_ENABLED: "{{ kafka_client_tls_enabled }}"
      KAFKA_SASL_ENABLED: "{{ kafka_client_sasl_enabled }}"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "{{ kafka_client_bootstrap_servers }}"
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: "{{ kafka_client_security_protocol }}"
