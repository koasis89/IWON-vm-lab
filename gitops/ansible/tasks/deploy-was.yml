- name: Deploy WAS artifact with java_service role
  ansible.builtin.include_role:
    name: java_service
  vars:
    java_service_name: was
    java_service_description: IWON WAS Service
    java_app_dir: /opt/apps/was
    java_jar_local_src: "{{ target_artifact }}"
    java_jar_remote_name: app.jar
    java_log_file: "{{ log_dir }}/was.log"
    java_xml_gpcl_patch: true
    java_env_vars:
      KAFKA_BOOTSTRAP_SERVERS: "{{ kafka_client_bootstrap_servers }}"
      KAFKA_SECURITY_PROTOCOL: "{{ kafka_client_security_protocol }}"
      KAFKA_TLS_ENABLED: "{{ kafka_client_tls_enabled }}"
      KAFKA_SASL_ENABLED: "{{ kafka_client_sasl_enabled }}"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "{{ kafka_client_bootstrap_servers }}"
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: "{{ kafka_client_security_protocol }}"
