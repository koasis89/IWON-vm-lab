name: Deploy Integration Artifact

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/deploy-integration.yml'
  workflow_dispatch:

concurrency:
  group: deploy-integration-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_TARGET: integration
  FEED_NAME: iwon-smart-feed
  MAVEN_PACKAGE_DEF: com.iteyes.smart:smart-integration
  ARTIFACT_PATTERN: '*.jar'

jobs:
  build-publish-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Compute immutable version
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "APP_VERSION=1.0.0-int.${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Build and publish Integration artifact
        shell: bash
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          AZURE_ARTIFACTS_ENV_ACCESS_TOKEN: ${{ secrets.ADO_PAT }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew clean build publish -x test

      - name: Trigger Azure DevOps deploy
        shell: bash
        env:
          ADO_ORG: ${{ secrets.ADO_ORG }}
          ADO_PROJECT: ${{ secrets.ADO_PROJECT }}
          ADO_PIPELINE_ID: ${{ secrets.ADO_PIPELINE_ID }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
        run: |
          set -euo pipefail
          cat > ado-run.json <<EOF
          {
            "templateParameters": {
              "runTerraform": "false",
              "deployTarget": "${DEPLOY_TARGET}",
              "artifactFeedName": "${FEED_NAME}",
              "mavenPackageDefinition": "${MAVEN_PACKAGE_DEF}",
              "mavenPackageVersion": "${APP_VERSION}",
              "artifactPattern": "${ARTIFACT_PATTERN}"
            }
          }
          EOF

          curl --fail-with-body -u ":${ADO_PAT}" \
            -H "Content-Type: application/json" \
            -X POST \
            --data @ado-run.json \
            "https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_apis/pipelines/${ADO_PIPELINE_ID}/runs?api-version=7.1"
