name: Deploy Web Artifact

on:
  push:
    branches: ["main"]
    paths:
      - "web/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: iwonpaymentweb-web-${{ github.ref }}
  cancel-in-progress: false

env:
  ADO_ORG: iteyes-ito
  ADO_PROJECT: iwon-smart-ops
  FEED_NAME: iwon-smart-feed
  DEPLOY_TARGET: web
  MAVEN_PACKAGE_DEF: com.iteyes.smart:smart-web
  ARTIFACT_PATTERN: "*.zip"

jobs:
  build-publish-trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Compute immutable version
        shell: bash
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "APP_VERSION=1.0.0-web.${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Build web module
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew :web:build -x test

      - name: Publish web package to Azure Artifacts
        shell: bash
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          AZURE_ARTIFACTS_ENV_ACCESS_TOKEN: ${{ secrets.ADO_PAT }}
        run: |
          ./gradlew :web:publish

      - name: Trigger Azure DevOps deploy (web)
        shell: bash
        env:
          ADO_PIPELINE_ID: ${{ secrets.ADO_PIPELINE_ID }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
        run: |
          set -euo pipefail
          API_URL="https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_apis/pipelines/${ADO_PIPELINE_ID}/runs?api-version=7.1"

          cat > run-pipeline.json <<EOF
          {
            "resources": {
              "repositories": {
                "self": {
                  "refName": "refs/heads/main"
                }
              }
            },
            "templateParameters": {
              "runTerraform": "false",
              "deployTarget": "${DEPLOY_TARGET}",
              "artifactFeedName": "${FEED_NAME}",
              "mavenPackageDefinition": "${MAVEN_PACKAGE_DEF}",
              "mavenPackageVersion": "${APP_VERSION}",
              "artifactPattern": "${ARTIFACT_PATTERN}"
            }
          }
          EOF

          RESPONSE=$(curl --fail-with-body --silent --show-error \
            -u ":${ADO_PAT}" \
            -H "Content-Type: application/json" \
            -X POST \
            --data @run-pipeline.json \
            "${API_URL}")

          echo "ADO Pipeline Run ID: $(echo "${RESPONSE}" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("id","unknown"))')"
