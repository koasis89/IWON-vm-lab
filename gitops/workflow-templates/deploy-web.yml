name: Deploy Web Artifact

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_TARGET: web
  FEED_NAME: iwon-smart-feed
  MAVEN_PACKAGE_DEF: com.iteyes.smart:smart-web
  ARTIFACT_PATTERN: '*.zip'

jobs:
  build-publish-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Compute immutable version
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "APP_VERSION=1.0.0-web.${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Package web artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/web-package

          # TODO: 실제 프론트 빌드 명령으로 교체
          # 예) npm ci && npm run build
          cp -R web/. dist/web-package/

          cd dist/web-package
          zip -r "../smart-web-${APP_VERSION}.zip" .

      - name: Create Maven settings for Azure Artifacts
        shell: bash
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>azure-artifacts</id>
                <username>ado</username>
                <password>${ADO_PAT}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Publish web zip to Azure Artifacts
        shell: bash
        env:
          ADO_ORG: ${{ secrets.ADO_ORG }}
          ADO_PROJECT: ${{ secrets.ADO_PROJECT }}
        run: |
          mvn -B deploy:deploy-file \
            -DgroupId=com.iteyes.smart \
            -DartifactId=smart-web \
            -Dversion=${APP_VERSION} \
            -Dpackaging=zip \
            -Dfile=dist/smart-web-${APP_VERSION}.zip \
            -DgeneratePom=true \
            -DrepositoryId=azure-artifacts \
            -Durl=https://pkgs.dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_packaging/${FEED_NAME}/maven/v1

      - name: Trigger Azure DevOps deploy
        shell: bash
        env:
          ADO_ORG: ${{ secrets.ADO_ORG }}
          ADO_PROJECT: ${{ secrets.ADO_PROJECT }}
          ADO_PIPELINE_ID: ${{ secrets.ADO_PIPELINE_ID }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
        run: |
          set -euo pipefail
          cat > ado-run.json <<EOF
          {
            "templateParameters": {
              "runTerraform": "false",
              "deployTarget": "${DEPLOY_TARGET}",
              "artifactFeedName": "${FEED_NAME}",
              "mavenPackageDefinition": "${MAVEN_PACKAGE_DEF}",
              "mavenPackageVersion": "${APP_VERSION}",
              "artifactPattern": "${ARTIFACT_PATTERN}"
            }
          }
          EOF

          curl --fail-with-body -u ":${ADO_PAT}" \
            -H "Content-Type: application/json" \
            -X POST \
            --data @ado-run.json \
            "https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_apis/pipelines/${ADO_PIPELINE_ID}/runs?api-version=7.1"
