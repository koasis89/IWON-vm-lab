---
- name: Install or refresh Azure DevOps self-hosted agent
  hosts: all
  become: true
  vars:
    ado_agent_version: "4.252.0"
    ado_agent_platform: "linux-x64"
    ado_agent_install_dir: "/opt/ado-agent"
    ado_agent_user: "iwon"
    ado_agent_group: "{{ ado_agent_user }}"
    ado_agent_name: "{{ inventory_hostname }}-ado"
    ado_agent_work_dir: "_work"
    ado_agent_replace: false
    ado_agent_download_url: "https://download.agent.dev.azure.com/agent/{{ ado_agent_version }}/vsts-agent-{{ ado_agent_platform }}-{{ ado_agent_version }}.tar.gz"

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - ado_url is defined
          - ado_url | length > 0
          - ado_pool is defined
          - ado_pool | length > 0
          - ado_pat is defined
          - ado_pat | length > 0
        fail_msg: "Required vars: ado_url, ado_pool, ado_pat"

    - name: Validate supported platform
      ansible.builtin.assert:
        that:
          - ansible_system == "Linux"
        fail_msg: "This playbook currently supports Linux hosts only."

  tasks:
    - name: Install base packages on Debian/Ubuntu
      ansible.builtin.apt:
        name:
          - curl
          - tar
          - gzip
          - unzip
          - jq
          - ca-certificates
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Install base packages on RedHat family
      ansible.builtin.package:
        name:
          - curl
          - tar
          - gzip
          - unzip
          - jq
          - ca-certificates
        state: present
      when: ansible_os_family == "RedHat"

    - name: Ensure agent group exists
      ansible.builtin.group:
        name: "{{ ado_agent_group }}"
        state: present

    - name: Ensure agent user exists
      ansible.builtin.user:
        name: "{{ ado_agent_user }}"
        group: "{{ ado_agent_group }}"
        shell: /bin/bash
        create_home: true

    - name: Create agent install directory
      ansible.builtin.file:
        path: "{{ ado_agent_install_dir }}"
        state: directory
        owner: "{{ ado_agent_user }}"
        group: "{{ ado_agent_group }}"
        mode: "0755"

    - name: Check agent binary
      ansible.builtin.stat:
        path: "{{ ado_agent_install_dir }}/bin/Agent.Listener"
      register: ado_agent_binary

    - name: Check agent registration marker
      ansible.builtin.stat:
        path: "{{ ado_agent_install_dir }}/.agent"
      register: ado_agent_configured

    - name: Check service marker
      ansible.builtin.stat:
        path: "{{ ado_agent_install_dir }}/.service"
      register: ado_agent_service_marker

    - name: Stop existing service before refresh
      ansible.builtin.command:
        cmd: "./svc.sh stop"
        chdir: "{{ ado_agent_install_dir }}"
      register: ado_agent_stop
      failed_when: false
      changed_when: ado_agent_stop.rc == 0
      when:
        - ado_agent_service_marker.stat.exists
        - ado_agent_replace | bool

    - name: Remove previous agent registration when replace requested
      ansible.builtin.shell: |
        if [ -f .agent ]; then
          ./config.sh remove --unattended --auth pat --token "{{ ado_pat }}"
        fi
      args:
        chdir: "{{ ado_agent_install_dir }}"
      become_user: "{{ ado_agent_user }}"
      no_log: true
      when:
        - ado_agent_configured.stat.exists
        - ado_agent_replace | bool

    - name: Download Azure DevOps agent package
      ansible.builtin.get_url:
        url: "{{ ado_agent_download_url }}"
        dest: "/tmp/vsts-agent-{{ ado_agent_platform }}-{{ ado_agent_version }}.tar.gz"
        mode: "0644"
      when: (not ado_agent_binary.stat.exists) or (ado_agent_replace | bool)

    - name: Extract Azure DevOps agent package
      ansible.builtin.unarchive:
        src: "/tmp/vsts-agent-{{ ado_agent_platform }}-{{ ado_agent_version }}.tar.gz"
        dest: "{{ ado_agent_install_dir }}"
        remote_src: true
        owner: "{{ ado_agent_user }}"
        group: "{{ ado_agent_group }}"
        extra_opts:
          - --overwrite
      when: (not ado_agent_binary.stat.exists) or (ado_agent_replace | bool)

    - name: Install agent runtime dependencies
      ansible.builtin.command:
        cmd: "./bin/installdependencies.sh"
        chdir: "{{ ado_agent_install_dir }}"
      register: ado_agent_dependencies
      changed_when: ado_agent_dependencies.rc == 0
      when: (not ado_agent_binary.stat.exists) or (ado_agent_replace | bool)

    - name: Configure agent (unattended)
      ansible.builtin.command:
        argv:
          - ./config.sh
          - --unattended
          - --url
          - "{{ ado_url }}"
          - --auth
          - pat
          - --token
          - "{{ ado_pat }}"
          - --pool
          - "{{ ado_pool }}"
          - --agent
          - "{{ ado_agent_name }}"
          - --work
          - "{{ ado_agent_work_dir }}"
          - --acceptTeeEula
          - --replace
      args:
        chdir: "{{ ado_agent_install_dir }}"
      become_user: "{{ ado_agent_user }}"
      register: ado_agent_config_result
      changed_when: ado_agent_config_result.rc == 0
      no_log: true
      when: (not ado_agent_configured.stat.exists) or (ado_agent_replace | bool)

    - name: Refresh service marker after configuration
      ansible.builtin.stat:
        path: "{{ ado_agent_install_dir }}/.service"
      register: ado_agent_service_marker_after

    - name: Install service
      ansible.builtin.command:
        cmd: "./svc.sh install {{ ado_agent_user }}"
        chdir: "{{ ado_agent_install_dir }}"
      register: ado_agent_service_install
      changed_when: ado_agent_service_install.rc == 0
      when: not ado_agent_service_marker_after.stat.exists

    - name: Start service
      ansible.builtin.command:
        cmd: "./svc.sh start"
        chdir: "{{ ado_agent_install_dir }}"
      register: ado_agent_start
      changed_when: ado_agent_start.rc == 0

    - name: Show status
      ansible.builtin.command:
        cmd: "./svc.sh status"
        chdir: "{{ ado_agent_install_dir }}"
      register: ado_agent_status
      changed_when: false

    - name: Print status output
      ansible.builtin.debug:
        var: ado_agent_status.stdout_lines
