apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workflow-tag-counter-rw
  namespace: argo
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workflow-tag-counter-rw
  namespace: argo
subjects:
  - kind: ServiceAccount
    name: argo-workflow
    namespace: argo
roleRef:
  kind: Role
  name: workflow-tag-counter-rw
  apiGroup: rbac.authorization.k8s.io
