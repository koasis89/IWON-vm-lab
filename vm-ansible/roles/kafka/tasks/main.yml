---
- name: Install Kafka prerequisites
  ansible.builtin.apt:
    name:
      - openjdk-17-jre-headless
      - wget
      - tar
    state: present
    update_cache: true

- name: Ensure Kafka directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(service_user) }}"
    group: "{{ item.group | default(service_user) }}"
    mode: "{{ item.mode | default('0755') }}"
  loop:
    - { path: "{{ kafka_data_dir }}" }
    - { path: "{{ kafka_config_dir }}" }
    - { path: "{{ scripts_dir }}" }

- name: Download Kafka archive
  ansible.builtin.get_url:
    url: "https://archive.apache.org/dist/kafka/{{ kafka_version }}/kafka_{{ kafka_scala_version }}-{{ kafka_version }}.tgz"
    dest: "/tmp/kafka_{{ kafka_scala_version }}-{{ kafka_version }}.tgz"
    mode: "0644"

- name: Extract Kafka archive
  ansible.builtin.unarchive:
    src: "/tmp/kafka_{{ kafka_scala_version }}-{{ kafka_version }}.tgz"
    dest: "{{ kafka_install_root }}"
    remote_src: true
    creates: "{{ kafka_install_root }}/kafka_{{ kafka_scala_version }}-{{ kafka_version }}"

- name: Link Kafka home
  ansible.builtin.file:
    src: "{{ kafka_install_root }}/kafka_{{ kafka_scala_version }}-{{ kafka_version }}"
    dest: "{{ kafka_home }}"
    state: link
    force: true

- name: Ensure Kafka logs directory is writable by service user
  ansible.builtin.file:
    path: "{{ kafka_home }}/logs"
    state: directory
    owner: "{{ service_user }}"
    group: "{{ service_user }}"
    mode: "0755"

- name: Deploy Kafka server.properties
  ansible.builtin.template:
    src: server.properties.j2
    dest: "{{ kafka_config_dir }}/server.properties"
    owner: root
    group: root
    mode: "0644"
  notify: Restart kafka

- name: Check Kafka cluster id marker
  ansible.builtin.stat:
    path: "{{ kafka_config_dir }}/cluster.id"
  register: kafka_cluster_id_file

- name: Generate Kafka cluster id
  ansible.builtin.command: "{{ kafka_home }}/bin/kafka-storage.sh random-uuid"
  register: kafka_cluster_id
  changed_when: true
  when: not kafka_cluster_id_file.stat.exists

- name: Persist Kafka cluster id
  ansible.builtin.copy:
    dest: "{{ kafka_config_dir }}/cluster.id"
    content: "{{ kafka_cluster_id.stdout }}\n"
    owner: root
    group: root
    mode: "0644"
  when: not kafka_cluster_id_file.stat.exists

- name: Format Kafka storage
  ansible.builtin.command: "{{ kafka_home }}/bin/kafka-storage.sh format -t {{ kafka_cluster_id.stdout }} -c {{ kafka_config_dir }}/server.properties"
  args:
    creates: "{{ kafka_data_dir }}/meta.properties"
  when: not kafka_cluster_id_file.stat.exists

- name: Create Kafka start script
  ansible.builtin.template:
    src: start-kafka.sh.j2
    dest: "{{ scripts_dir }}/start-kafka.sh"
    owner: root
    group: root
    mode: "0755"
  notify: Restart kafka

- name: Create Kafka systemd unit
  ansible.builtin.template:
    src: kafka.service.j2
    dest: /etc/systemd/system/kafka.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart kafka

- name: Flush handlers before enabling kafka
  ansible.builtin.meta: flush_handlers

- name: Ensure Kafka service is enabled
  ansible.builtin.systemd:
    name: kafka
    enabled: true
    state: started
