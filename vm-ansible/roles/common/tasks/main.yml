---
- name: Install common packages
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present
    update_cache: true

- name: Ensure shared directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(service_user) }}"
    group: "{{ item.group | default(service_user) }}"
    mode: "{{ item.mode | default('0755') }}"
  loop:
    - { path: "{{ vm_lab_root }}", mode: "0755" }
    - { path: "{{ scripts_dir }}", mode: "0755" }
    - { path: "{{ log_dir }}", mode: "0755" }
